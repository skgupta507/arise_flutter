name: Build & Release Arise Flutter APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 4. Extract version from tag ────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "tag=$TAG"  >> $GITHUB_OUTPUT
          echo "ver=$VER"  >> $GITHUB_OUTPUT
          IFS='.' read -r major minor patch <<< "$VER"
          CODE=$(( ${major:-1}*10000 + ${minor:-0}*100 + ${patch:-0} ))
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Version: $VER  Code: $CODE"

      # ── 5. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > arise-release.jks
          cat > android/keystore.properties << 'KEOF'
          storeFile=../../arise-release.jks
          storePassword=${{ secrets.KEYSTORE_PASS }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASS }}
          KEOF

      # ── 6. Flutter dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 7. Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.ver }} \
            --build-number=${{ steps.version.outputs.code }}

      # ── 8. Rename ──────────────────────────────────────────────────────────
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk arise.apk

      # ── 9. Upload artifact ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arise-${{ steps.version.outputs.tag }}
          path: arise.apk
          retention-days: 90

      # ── 10. GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Arise Music ${{ steps.version.outputs.tag }}"
          draft:      false
          prerelease: false
          body: |
            ## 🔥 Arise Music ${{ steps.version.outputs.tag }}

            ### What's new
            <!-- Update this section with your changes -->
            - Bug fixes and improvements

            ### Install
            Download **arise.apk** below and install on Android 8.0+.

            ### Update
            Already installed? The app detects this release automatically
            and prompts you to update — no manual download needed.
          files: arise.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
